syntax = "proto3";

package botanica;

option go_package = "github.com/ricocynthia/botanica/proto";

// --- Remedy Messages ---

message Ingredient {
  string name = 1;
  string amount = 2;
  string notes = 3;
}

message Remedy {
  int32 id = 1;
  string name = 2;
  string type = 3;
  string description = 4;
  string origin = 5;
  repeated Ingredient ingredients = 6;
  repeated string properties = 7;
  string preparation = 8;
  string notes = 9;
}

message GetRemediesRequest {
  string type = 1;
  string property = 2;
}

message GetRemediesResponse {
  int32 count = 1;
  repeated Remedy remedies = 2;
}

message GetRemedyRequest {
  int32 id = 1;
}

message GetIngredientsRequest {}

message GetIngredientsResponse {
  int32 count = 1;
  repeated string ingredients = 2;
}

// --- Forageable Messages ---

message Forageable {
  int32 id = 1;
  string name = 2;
  string category = 3;
  string tagline = 4;
  repeated string properties = 5;
  string habitat = 6;
  string season = 7;
  string parts = 8;
  string uses = 9;
  string identification = 10;
  string harvesting = 11;
  string storage = 12;
  string warnings = 13;
  string fun_fact = 14;
}

message GetForageablesRequest {
  string category = 1;
  string property = 2;
}

message GetForageablesResponse {
  int32 count = 1;
  repeated Forageable forageables = 2;
}

message GetForageableRequest {
  int32 id = 1;
}

// --- Service ---

service BotanicaService {
  // Remedies
  rpc GetRemedies(GetRemediesRequest) returns (GetRemediesResponse);
  rpc GetRemedy(GetRemedyRequest) returns (Remedy);
  rpc GetIngredients(GetIngredientsRequest) returns (GetIngredientsResponse);

  // Forageables
  rpc GetForageables(GetForageablesRequest) returns (GetForageablesResponse);
  rpc GetForageable(GetForageableRequest) returns (Forageable);
}